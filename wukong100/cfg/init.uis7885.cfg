{
    "import" : [
            "/vendor/etc/init.${ohos.boot.hardware}.usb.cfg",
            "/vendor/etc/init.${ohos.boot.hardware}.gnss.cfg",
            "/vendor/etc/init.${ohos.boot.hardware}.minidump.cfg"
    ],
    "jobs" : [{
            "name" : "pre-init",
            "cmds" : [
                "write /proc/sys/vm/min_free_kbytes 10240",
                "mount debugfs /sys/kernel/debug /sys/kernel/debug mode=755",
                "write /sys/kernel/debug/hisi_inno_phy/role peripheral"
            ]
        }, {
            "name" : "init",
            "cmds" : [
                "insmod /vendor/lib64/modules/mali_kbase.ko",
                "insmod /vendor/lib64/modules/unisoc_wcn_bsp.ko",
                "insmod /vendor/lib64/modules/unisoc_gnss_common_ctl_all.ko",
                "insmod /vendor/lib64/modules/unisoc_gnss_dbg.ko",
                "insmod /vendor/lib64/modules/unisoc_gnss_pmnotify_ctl.ko",
                "insmod /vendor/lib64/modules/agdsp_pd.ko",
                "insmod /vendor/lib64/modules/audio_mem.ko",
                "insmod /vendor/lib64/modules/audio_sipc.ko",
                "insmod /vendor/lib64/modules/audio-dsp-dump.ko",
                "insmod /vendor/lib64/modules/sprd_apipe.ko",
                "insmod /vendor/lib64/modules/audio-pipe.ko",
                "insmod /vendor/lib64/modules/mcdt_hw_r2p0.ko",
                "insmod /vendor/lib64/modules/sprd_audcp_dvfs.ko",
                "insmod /vendor/lib64/modules/sprd_audcp_boot.ko",
                "insmod /vendor/lib64/modules/voice_trigger_irq.ko",
                "insmod /vendor/lib64/modules/smp_aw87xxx.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-card.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-codec-ump9620-power.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-codec-ump9620-power-dev.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-codec-ump9620.ko",
                "insmod /vendor/lib64/modules/snd-soc-unisoc-dp-codec.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-dummy-codec.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-pa-ucp1301.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-pdm-r2p0.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-tdm.ko",
                "insmod /vendor/lib64/modules/sprd-platform-pcm-routing.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-vbc-v4.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-vbc-fe.ko",
                "insmod /vendor/lib64/modules/snd-soc-sprd-dai.ko",
                "insmod /vendor/lib64/modules/sprd-dmaengine-pcm.ko",
                "insmod /vendor/lib64/modules/sprd-compr-2stage-dma.ko",
                "insmod /vendor/lib64/modules/sprd_wlan_combo.ko",
                "insmod /vendor/lib64/modules/sprdbt_tty.ko",
                "insmod /vendor/lib64/modules/sle_soc.ko",
                "insmod /vendor/lib64/modules/npu_img_vha.ko",
                "insmod /vendor/lib64/modules/gslx680.ko",
                "insmod /vendor/lib64/modules/vpu.ko",
                "write /proc/1/oom_score_adj -1000",
                "write /proc/sys/kernel/hung_task_timeout_secs 90",
                "write /sys/kernel/hungtask/enable on",
                "write /sys/kernel/hungtask/monitorlist whitelist,init,appspawn",
                "chown system system /sys/kernel/hungtask/userlist",
                "symlink /dev/block/platform/soc/soc:ap-ahb/22000000.ufs/by-name /dev/block/by-name",
                "insmod /vendor/lib64/modules/plat_soc.ko"
            ]
        }, {
            "name" : "post-fs-data",
            "cmds" : [
                "wait /sys/touchscreen/ts_suspend",
                "chmod 666 /sys/touchscreen/ts_suspend",
                "restorecon",
                "restorecon /dev",
                "restorecon /data/updater",
                "restorecon /data/ashmem",
                "chown composer_host composer_host /sys/class/backlight/sprd_backlight/brightness"
            ]
        }, {
            "name" : "boot",
            "cmds" : [
                "chmod 775 /sys/class/rfkill/rfkill0/state",
                "chown blue_host blue_host /sys/class/rfkill/rfkill0/state",
                "wait /dev/ttyBT0",
                "chown blue_host blue_host /dev/ttyBT0",
                "chown blue_host blue_host /dev/ttyBT1",
                "chown blue_host blue_host /proc/bluetooth/sleep/lpm",
                "chown blue_host blue_host /proc/bluetooth/sleep/btwrite",
                "chown bluetooth bluetooth /dev/uhid",
                "chmod 777 /sys/class/misc/gnss_common_ctl/gnss_subsys",
                "chmod 777 /dev/gnss_common_ctl",
                "chmod 777 /sys/class/misc/gnss_common_ctl/gnss_power_enable",
                "chown camera_host camera_host /dev/vpu_enc0",
                "chown camera_host camera_host /dev/vpu_enc1",
                "chmod 666 /dev/hwsle",
                "write /sys/block/zram0/disksize 1024M",
                "mkswap /dev/block/zram0",
                "swapon /dev/block/zram0",
                "chmod 777 /data/bluetooth",
                "chmod 0440 /proc/interrupts",
                "chmod 0440 /proc/stat",
                "chmod 777 /sys/class/drm/card0-DSI-1/status",
                "chmod 0640 /dev/xt_qtaguid",
                "mkdir /data/ashmem 0777 disp_gralloc_host disp_gralloc_host",
                "chmod 0660 /proc/net/xt_qtaguid/ctrl",
                "chmod 0440 /proc/net/xt_qtaguid/stats",
                "chmod 666 /dev/mali0",
                "chown system graphics /dev/mali0",
                "chmod 666 /dev/vha0",
                "chmod 666 /dev/dri/card1",
                "chown system graphics /dev/dri/card1",
                "chmod 666 /dev/dri/renderD129",
                "chown system graphics /dev/dri/renderD129",
                "chown system graphics /dev/graphics/fb0",
                "chmod 666 /dev/dma_heap/system-uncached",
                "chmod 666 /dev/dma_heap/system",
                "chmod 666 /dev/sched_rtg_ctrl",
                "chown system system /dev/sched_rtg_ctrl",
                "chown update update /dev/block/mmcblk0p2",
                "chmod 666 /dev/v4l-subdev0",
                "chown ispserver ispserver /dev/v4l-subdev0",
                "chmod 666 /dev/v4l-subdev0",
                "chown ispserver ispserver /dev/v4l-subdev1",
                "chmod 666 /dev/v4l-subdev0",
                "chown ispserver ispserver /dev/v4l-subdev2",
                "chmod 666 /dev/v4l-subdev0",
                "chown ispserver ispserver /dev/v4l-subdev3",
                "chmod 666 /dev/sprd_vsp",
                "chown system graphics /dev/sprd_dmabuf",
                "chmod 666 /dev/sprd_dmabuf",
                "chmod 666 /dev/media0",
                "chown camera_host camera_host /dev/sprd_cpp",
                "chown camera_host camera_host /dev/sprd_jpg",
                "chown camera_host camera_host /dev/sprd_vsp",
                "chown camera_host camera_host /dev/sprd_sensor",
                "chown camera_host camera_host /dev/sprd_image",
                "chown camera_host camera_host /dev/sprd_video",
                "chown camera_host camera_host /dev/sprd_jpg",
                "chown camera_host camera_host /dev/dma_heap/system",
                "chown camera_host camera_host /sys/devices/virtual/misc/sprd_sensor/camera_sensor_name"
            ]
        }
    ]
}
