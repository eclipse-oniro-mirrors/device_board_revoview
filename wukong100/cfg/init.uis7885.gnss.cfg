{
    "jobs" : [{
            "name" : "boot",
            "cmds" : [
                "chown location_host location_host /dev/data0_gnss",
                "chmod 660 /dev/data0_gnss",
                "chown location_host location_host /dev/gnss_pmnotify_ctl",
                "chmod 660 /dev/gnss_pmnotify_ctl",
                "chown location_host location_host /dev/gnss_dbg",
                "chmod 660 /dev/gnss_dbg",
                "chown location_host location_host /dev/gnss_common_ctl",
                "chmod 660 /dev/gnss_common_ctl",
                
                "chown location_host location_host /sys/class/misc/gnss_common_ctl/gnss_power_enable",
                "chmod 660 /sys/class/misc/gnss_common_ctl/gnss_power_enable",
                "chown location_host location_host /sys/class/misc/gnss_common_ctl/gnss_subsys",
                "chmod 660 /sys/class/misc/gnss_common_ctl/gnss_subsys",
                "chown location_host location_host /sys/class/misc/gnss_common_ctl/gnss_dump",
                "chmod 660 /sys/class/misc/gnss_common_ctl/gnss_dump"
            ]
        }, {
            "name" : "boot",
            "cmds" : [
                "mkdir /data/vendor/gnss/sprd 0777 location_host location_host"
            ]
        }
    ]
}
